<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ Google Site Verification -->
    <meta name="google-site-verification" content="RJoAKp5Cg78P3p4OvAD8f_IgNCCMpgbn0GHWIJ8njXM" />

    <title>{% block title %}JD Skill Analyzer Pro{% endblock %}</title>

    <!-- ✅ Bootstrap CSS (updated version) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 15px;
        }

        .skill-badge {
            margin: 5px;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        .primary { background: #4CAF50; color: white; }
        .secondary { background: #2196F3; color: white; }
        .soft { background: #FF9800; color: white; }
    </style>
</head>

<body>

<!-- ✅ Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid d-flex justify-content-between">

        <div>
            <a class="btn btn-outline-light me-2" href="javascript:history.back()">⬅ Back</a>
            <a class="navbar-brand" href="{% url 'upload_jd' %}">🎯 JD Skill Analyzer Pro</a>
        </div>

        <div>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Logout</button>
            </form>
        </div>

    </div>
</nav>

<!-- ✅ Main Content -->
<div class="container">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}

</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
